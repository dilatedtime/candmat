# ── AI tools declaration (transparency only) ────────────────────────────────
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude (Claude Code) for architecture discussion, code authoring, and
  review of the ranking pipeline. No candidate data is sent to any hosted LLM
  during ranking — the ranking step is fully local, CPU-only, and offline. The
  only model used is a local sentence-transformer (bge-small-en-v1.5) run offline
  to precompute embeddings.

# ── Approach summary ────────────────────────────────────────────────────────
methodology_summary: |
  Offline-heavy / online-light hybrid ranker. A local sentence-transformer
  (bge-small) embeds the JD and each candidate's career-history substance offline;
  the shipped rank.py loads those vectors and fuses a semantic-recall score with a
  structured JD-rubric score (trusted must-have skills, career-history evidence,
  experience band, product-company/geo/eval-literacy context). Skill trust =
  endorsements x duration x proficiency, so keyword stuffers earn no credit.
  Explicit honeypot detection (expert-with-0-months, impossible dates) forces
  impossible profiles to ~0; a pool-relative availability modifier down-weights
  stale/low-response candidates. Sort is score-desc then candidate_id-asc. Reasoning
  strings are built only from real profile fields (no hallucination). The full 100K
  ranking step runs on CPU with no network in well under 5 minutes.

